function a1Tab(tab){gm('A1').detailTab=tab;if(sel==='A1')rdA1('A1');}
function a1NoteInput(ta){const btn=document.getElementById('a1-save-btn');if(!btn)return;const has=ta.value.trim().length>0;btn.className='step-cta-btn '+(has?'orange':'muted');btn.disabled=!has;}
function a1ToggleHide(id){const m=gm(id);m.showComplete=!m.showComplete;if(sel===id){const sw=document.querySelector('.step-list-wrap');const st=sw?sw.scrollTop:0;rdA1(id);requestAnimationFrame(()=>{const s=document.querySelector('.step-list-wrap');if(s)s.scrollTop=st;});}}
function a1ToggleRejected(id){const m=gm(id);m.showRejected=!m.showRejected;if(sel===id){const sw=document.querySelector('.step-list-wrap');const st=sw?sw.scrollTop:0;rdA1(id);requestAnimationFrame(()=>{const s=document.querySelector('.step-list-wrap');if(s)s.scrollTop=st;});}}
function a1StepMenu(e,id,i){e.stopPropagation();promptSkipStep(id,i);}

function a1CallCourier(id,i){
  const a=ACTIONS.find(x=>x.id===id);const l=gl(id);const m=gm(id);
  callM(a.courierName,false,(k)=>{
    if(k==='done'){
      const n=nv('mn');
      if(n)l.push({t:ts(),text:`<strong>Call notes — ${a.courierName}:</strong> ${n}`,agent:true});
      m.callTime=ts();
      l.push({t:ts(),text:`<strong>Call completed</strong> — ${a.courierName}`,agent:true});
      ms2(id,i);doneM('Call logged','Step marked as complete');
    }
  });
  l.push({t:ts(),text:`<strong>Call initiated</strong> — ${a.courierName}`,agent:true});
  rdA1(id);
}

function a1SaveNotes(id,i){
  const ta=document.getElementById('a1-notes-ta');
  const notes=ta?ta.value.trim():'';
  if(!notes){showToast('Please add notes before saving',true);return;}
  const m=gm(id);const l=gl(id);
  const wasComplete=!!gc(id)[i];
  m.notes=notes;
  l.push({t:ts(),text:`<strong>Notes ${wasComplete?'updated':'saved'}</strong>`,agent:true});
  if(!wasComplete){
    m.notesTime=ts();
    ms2(id,i);
    doneM('Notes saved','Step marked as complete');
  } else {
    showToast('Notes updated');
    rdA1(id);rl();
  }
}

function a1ToggleCb(id,ci){
  const a=ACTIONS.find(x=>x.id===id);if(!a)return;
  const m=gm(id);
  if(!m.escalateChecks)m.escalateChecks=[false,false,false];
  const escIdx=a.steps.findIndex(s=>s.id==='escalate');
  if(escIdx>=0&&gc(id)[escIdx])return; // already complete — don't toggle
  m.escalateChecks[ci]=!m.escalateChecks[ci];
  if(sel===id)rdA1(id);
}

function a1Escalate(id,i){
  const m=gm(id);const l=gl(id);
  const checks=m.escalateChecks||[false,false,false];
  if(!checks.some(c=>c))return;
  confirmM('Escalate to Safety Team?','The on-call safety team will be notified — continue monitoring',()=>{
    m.escalateTime=ts();
    l.push({t:ts(),text:'<strong>Escalated</strong> to Safety Team',agent:true});
    ms2(id,i);doneM('Escalated','Safety team notified — incident stays open');
  });
}

function rdClosed(idx){
  const c=CLOSED[idx];const a=c.action;
  const ch=chk[a.id]||{};const sk=skipped[a.id]||{};const l=logs[a.id]||a.log||[];
  const doneCountC=a.steps.filter((s,i)=>ch[i]||sk[i]).length;
  const sh=a.steps.map((step,i)=>{
    const done=!!ch[i];const isSkipped=!!sk[i];
    return`<tr class="ct-row ${done?'done':isSkipped?'skipped':''}">
      <td class="ct-check"><div class="check-box ${done?'checked':isSkipped?'crossed':''}"></div></td>
      <td class="ct-body"><div class="cml">${step.label}</div>
      ${isSkipped?`<span class="skip-reason-tag">Not needed — ${sk[i]}</span>`:''}
      </td></tr>`;
  }).join('');
  const lh=renderLog(l);
  document.getElementById('detail-panel').innerHTML=`
    <div class="detail-header">
      <pie-button variant="ghost" size="xsmall" onclick="backToList()"><icon-arrow-left size="xs"></icon-arrow-left> Recently closed</pie-button>
      <div class="detail-header-row">
        <div class="detail-title">${a.type}</div>
        <pie-button variant="secondary" size="xsmall" onclick="openClosedTicket(${idx})">Ticket</pie-button>
      </div>
      <div class="detail-meta">${stag(a.severity)}${otag(a.orderId)}<span class="ptag ptag-neutral">Closed</span><span style="font-size:12px;color:var(--dt-color-content-disabled)">${timeAgo(c.closedAt)}</span></div>
    </div>
    <div class="detail-body">
      <pie-notification isCompact variant="neutral" style="margin-bottom:var(--dt-spacing-d)">Closed: ${c.closedReason} — ${new Date(c.closedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</pie-notification>
      <div class="section">
        <div class="table-scroll" style="margin-top:0">
          <div class="pie-dt-header">
            <div><span class="pie-dt-title">Steps at close</span><span class="pie-dt-meta">${doneCountC} of ${a.steps.length} done</span></div>
          </div>
          <table class="checklist-table">${sh}</table>
        </div>
      </div>
      <div class="section"><div class="section-label">Activity log</div>${lh}</div>
    </div>`;
}

/* ===== COURIER CALL ===== */
function hcc(e,id,si,name,ck){
  e.stopPropagation();const l=gl(id);const m=gm(id);
  const useOnlineModal=(id==='A6');
  const callFn=useOnlineModal?callCourierOnlineM:callM;
  callFn(name,false,(k)=>{
    if(k==='done'){
      if(!m['c_'+ck])m['c_'+ck]=new Set();m['c_'+ck].add(name);
      const n=nv('mn');
      if(n)l.push({t:ts(),text:`<strong>Call notes — ${name}:</strong> ${n}`,agent:true});
      if(useOnlineModal&&courierOnlineStatus!==null){
        m['online_'+name]=courierOnlineStatus;
        l.push({t:ts(),text:`<strong>${name}</strong> — ${courierOnlineStatus?'coming online':'unavailable'}`,agent:true});
      }
      l.push({t:ts(),text:`<strong>Call completed</strong> — ${name}`,agent:true});
      const a=ACTIONS.find(x=>x.id===id);const step=a.steps[si];const crs=a[ck]||[];
      if(step.allCalls&&crs.every(c=>m['c_'+ck].has(c.name)))ms2(id,si);
      doneM('Call logged','Courier marked as called');rd(id);rl();
    }
  });
  l.push({t:ts(),text:`<strong>Call initiated</strong> — ${name}`,agent:true});rd(id);
}

/* ===== BUTTON HANDLER ===== */
function hb(e,id,i,label){
  e.stopPropagation();const a=ACTIONS.find(x=>x.id===id);const l=gl(id);const m=gm(id);

  // CUSTOMER UNREACHABLE — system recommendation confirm/override
  if(label==='Confirm — return needed'){
    if(gc(id)[0]){doneM('Already confirmed','This step has already been completed',true);return;}
    a.steps=[a.steps[0],...RETURN_NEEDED_STEPS];
    l.push({t:ts(),text:'<strong>Confirmed: Return needed</strong>',agent:true});
    ms2(id,0);return;
  }
  if(label==='Confirm — leave safe'){
    if(gc(id)[0]){doneM('Already confirmed','This step has already been completed',true);return;}
    a.type='Customer unreachable — return not needed';
    a.steps=[a.steps[0],...RETURN_NOT_NEEDED_STEPS];
    l.push({t:ts(),text:'<strong>Confirmed: Leave safe</strong>',agent:true});
    ms2(id,0);return;
  }
  if(label==='Override — return not needed'){
    overrideM('Return needed','Return not needed',(note)=>{
      m.ovNote=note;a.type='Customer unreachable — return not needed';a.banner=null;
      a.steps=[a.steps[0],...RETURN_NOT_NEEDED_STEPS];
      l.push({t:ts(),text:`<strong>Override: Return not needed.</strong> Reason: ${note}`,agent:true});
      ms2(id,0);doneM('Override applied','Steps updated — continue with the new approach');
    });return;
  }
  if(label==='Override — return needed'){
    overrideM('Return not needed','Return needed',(note)=>{
      m.ovNote=note;a.type='Customer unreachable — return needed';
      a.banner={type:'safety',text:'This order cannot be left unattended. Courier must return to partner.'};
      a.steps=[a.steps[0],...RETURN_NEEDED_STEPS];
      l.push({t:ts(),text:`<strong>Override: Return needed.</strong> Reason: ${note}`,agent:true});
      ms2(id,0);doneM('Override applied','Steps updated — continue with the new approach');
    });return;
  }

  // SNOOZE
  if(label==='Snooze'){snoozeM(id,i);return;}

  // HEAVY ORDER — split
  if(label==='Split order'){
    splitOrderM(a.orderId,(total)=>{
      const newOrders=total-1;
      downstreamM(`Split ${a.orderId} — ${total} orders total`,[
        `${newOrders} additional order${newOrders>1?'s':''} created (${total} total)`,
        `New order numbers assigned to all orders`,
        `All ${total} orders sent to partner orderpad`,
        `Partner notified of split`,
        `${total} couriers assigned automatically`,
      ],()=>{
        l.push({t:ts(),text:`<strong>Order split — ${total} orders.</strong> All downstream actions triggered.`,agent:true});
        ms2(id,0);doneM('Order split','Partner and couriers notified');
      });
    });return;
  }
  if(label==='Override: no split needed'){
    overrideM('Split needed','No split needed',(note)=>{
      m.ovNote=note;
      l.push({t:ts(),text:`<strong>Override: no split needed.</strong> Reason: ${note}`,agent:true});
      ms2(id,0);doneM('Override applied','Incident will close — note saved');
    });return;
  }

  // ORDER MISSING — compensation
  if(label==='Recook compensation'||label==='No compensation'){
    const give=label==='Recook compensation';
    compensationM(give,(gave,reason)=>{
      m.compensation={give:gave,reason};
      l.push({t:ts(),text:`<strong>Compensation</strong>: ${gave?'Approved':'Not given'} — ${reason}`,agent:true});
      ms2(id,i);doneM(gave?'Recook compensation approved':'No compensation',`Reason: ${reason}`);
    });return;
  }
  if(label==='Unassign courier'){
    confirmM('Unassign courier?','Courier will be removed — order enters reassignment logic automatically',()=>{
      l.push({t:ts(),text:'<strong>Courier unassigned</strong> — order entered reassignment logic',agent:true});
      ms2(id,i);doneM('Courier unassigned','Order reassignment triggered automatically');
    });return;
  }
  if(label==='Confirm courier payment'){
    confirmM('Confirm courier payment?','Payment for travel and wait time will be processed',()=>{
      l.push({t:ts(),text:'<strong>Courier payment confirmed</strong>',agent:true});
      ms2(id,i);doneM('Payment confirmed','Courier notified');
    });return;
  }

  // PARTNER STATUS CHECK
  if(label==='Partner closed'||label==='False alarm'){
    if(label==='False alarm'){
      confirmM('Partner is open?','If confirmed, this incident will be closed as a false alarm',()=>{
        l.push({t:ts(),text:'<strong>Partner status: Open</strong> — closing as false alarm',agent:true});
        ms2(id,i);setTimeout(()=>closeAndResolve(id,'False alarm — partner is open'),500);
      });
    }else{
      // Show pause partner modal inline — completing this step on confirm
      mcb=(k)=>{
        if(k==='cancel-existing'){
          downstreamM('Pause partner + cancel existing orders',[
            'Partner immediately paused — no new orders',
            'Customers can no longer order from this partner',
            'All in-progress orders cancelled',
            'Customers refunded in full',
            'Customers notified with apology voucher',
            'Couriers paid for travel and wait time',
            'Partner account flagged for review',
          ],()=>{
            l.push({t:ts(),text:'<strong>Partner closed & paused</strong> — existing orders cancelled',agent:true});
            ms2(id,i);ms2(id,i+1);doneM('Done','Partner paused and orders cancelled');
          });
        }else if(k==='keep-existing'){
          l.push({t:ts(),text:'<strong>Partner closed & paused</strong> — existing orders completing normally',agent:true});
          ms2(id,i);doneM('Partner paused','No new orders — existing orders will complete');
        }
      };
      showM('⏸','warn','Pause partner?','Pausing will have the following effects:','stern',
        `<ul class="modal-list" style="margin-bottom:14px">
           <li>Customers will no longer be able to order from this partner</li>
           <li>Revenue impact for JET and the partner</li>
         </ul>
         <div class="modal-lbl">Should existing in-progress orders be cancelled?</div>`,
        [{l:'Yes — cancel existing orders',c:'confirm-btn',k:'cancel-existing'},{l:'No — let them complete',c:'',k:'keep-existing'},{l:'Back',c:'',k:'x'}]);
    }
    return;
  }

  // CALLS
  const isCall=label==='Call Sara M.'||label==='Call customer'||label==='Call partner'||label==='Call Cafe Grill'||label==='Call partner'||label==='Call Burger Palace';
  if(isCall){
    const tg=label.replace(/^Call /,'');const mandatory=!!(a.steps[i]&&a.steps[i].mandatoryNote);
    callM(tg,mandatory,(k)=>{
      if(k==='done'){const n=nv('mn');
        if(mandatory&&!n){doneM('Note required','Please add call notes before confirming',true);return;}
        if(n){l.push({t:ts(),text:`<strong>Call notes — ${tg}:</strong> ${n}`,agent:true});m['n'+i]=n;if(id==='A5')m.cardNote=n.length>60?n.slice(0,60)+'…':n;}
        l.push({t:ts(),text:`<strong>Call completed</strong> — ${tg}`,agent:true});ms2(id,i);doneM('Call logged','Step marked as complete');rl();
      }
    });l.push({t:ts(),text:`<strong>Call initiated</strong> — ${tg}`,agent:true});return;
  }

  // SAFETY
  if(label==='Escalate'){
    confirmM('Escalate to safety team?','The on-call safety team will be notified — continue working through remaining steps',()=>{
      l.push({t:ts(),text:'<strong>Escalated</strong> to safety team — incident remains open',agent:true});
      ms2(id,i);doneM('Escalated','Safety team notified — continue with remaining steps');
    });return;
  }
  if(label==='Log incident'){
    mcb=(k)=>{
      if(k==='y'){const notes=nv('log-notes');
        if(!notes){doneM('Notes required','Please add incident notes before logging',true);return;}
        l.push({t:ts(),text:`<strong>Incident logged:</strong> ${notes}`,agent:true});
        ms2(id,i);doneM('Incident logged','Notes saved to record');
      }
    };
    showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm','Log incident','Add notes for the incident record.','',
      `<div class="modal-lbl">Incident notes <span style="color:var(--pink);font-weight:400">*required</span></div>
       <textarea id="log-notes" class="modal-ta" rows="5" placeholder="Describe what happened and actions taken…" required></textarea>`,
      [{l:'Save log',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
    return;
  }

  // SAFETY — CANCEL ORDER with downstream
  if(label==='Cancel order'&&id==='A1'){
    downstreamM('Cancel order #A-2844',[
      'Customer refunded in full','Customer notified with apology',
      'Voucher issued to customer','Courier informed of cancellation',
      'Incident recorded on customer account','Flagged to safety review team',
    ],()=>{l.push({t:ts(),text:'<strong>Order cancelled</strong> — all downstream actions triggered',agent:true});ms2(id,i);doneM('Done','All downstream actions triggered');});
    return;
  }

  // PARTNER CLOSED — cancel with downstream
  if(label==='Cancel & trigger actions'){
    downstreamM('Cancel order #A-2846',['Customer refunded in full','Customer notified of cancellation','Voucher offered to customer','Courier paid for travel and wait time','Courier informed of cancellation','Partner offlined temporarily','Partner notified of failure','Flagged to partner management team'],()=>{
      l.push({t:ts(),text:'<strong>Order cancelled</strong> — all downstream actions triggered',agent:true});ms2(id,i);doneM('Done','All downstream actions triggered');
    });return;
  }

  // PAUSE PARTNER — with downstream + existing orders question
  if(label==='Pause partner'){
    mcb=(k)=>{
      if(k==='cancel-existing'){
        downstreamM('Pause partner + cancel existing orders',[
          'Partner immediately paused — no new orders',
          'Customers can no longer order from this partner',
          'All in-progress orders cancelled',
          'Customers refunded in full',
          'Customers notified with apology voucher',
          'Couriers paid for travel and wait time',
          'Partner account flagged for review',
        ],()=>{
          l.push({t:ts(),text:'<strong>Partner paused</strong> — existing orders cancelled',agent:true});
          ms2(id,i);doneM('Done','Partner paused — all downstream actions triggered');
        });
      }else if(k==='keep-existing'){
        l.push({t:ts(),text:'<strong>Partner paused</strong> — existing orders completing normally',agent:true});
        ms2(id,i);doneM('Partner paused','No new orders — existing orders will complete');
      }
    };
    showM('⏸','warn','Pause partner?','Pausing will have the following effects:','stern',
      `<ul class="modal-list" style="margin-bottom:14px">
         <li>Customers will no longer be able to order from this partner</li>
         <li>Revenue impact for JET and the partner</li>
       </ul>
       <div class="modal-lbl">Should existing in-progress orders be cancelled?</div>`,
      [{l:'Yes — cancel existing orders',c:'confirm-btn',k:'cancel-existing'},{l:'No — let them complete',c:'',k:'keep-existing'},{l:'Back',c:'',k:'x'}]);
    return;
  }

  // RETURN TRIGGERS
  if(label==='Trigger return'){
    recipientM((r)=>{if(r)m.recipient=r;l.push({t:ts(),text:`<strong>Return triggered</strong>${r?' — recipient: '+r:''}`,agent:true});ms2(id,i);doneM('Return triggered','Courier instructed to return the order');rd(id);});return;
  }
  if(label==='Confirm return completed'){confirmM('Confirm return completed?','This will complete this step',()=>{l.push({t:ts(),text:'<strong>Return confirmed complete</strong>',agent:true});ms2(id,i);});return;}

  // LEAVE SAFE — with downstream
  if(label.toLowerCase().includes('leave safe')){
    downstreamM('Authorise leave safe for '+(a.orderId||'order'),[
      'Courier notified of authorisation',
      'Courier must photograph the drop location',
      'Courier must note exact drop location',
      'Photo and location note sent to customer',
    ],()=>{l.push({t:ts(),text:'<strong>Leave safe authorised</strong> — all downstream triggered',agent:true});ms2(id,i);doneM('Authorised','Courier notified — photo and note required');});return;
  }

  // ZONE PAUSE — auto-approves after 3s
  if(label.includes('zone pause')){
    mcb=(k)=>{if(k==='y'){
      l.push({t:ts(),text:'<strong>Zone pause requested</strong> — awaiting approval',agent:true});
      if(sel===id)rd(id);rl();
      setTimeout(()=>{
        if(!ACTIONS.find(x=>x.id===id))return;
        l.push({t:ts(),text:'<strong>Zone pause approved</strong> — N4 paused, new orders stopped',agent:true});
        closeAndResolve(id,'Zone paused — incident resolved');
        doneM('Zone pause approved','Zone N4 has been paused — new orders have stopped');
      },3000);
    }};
    showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm','Request zone pause?','This will stop new orders in zone N4 — this action will be noted against your account and may impact your SLA rating','stern','',[{l:'I understand — confirm',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
    return;
  }

  if(label.includes('pay boost')){confirmM('Offer pay boost?','A pay incentive will be sent to offline couriers in N4 — funded by Swift Logistics',()=>{m.payBoostOffered=true;l.push({t:ts(),text:'<strong>Pay boost offered</strong>',agent:true});rd(id);doneM('Pay boost sent','Offline couriers in N4 notified');});return;}
  if(label==='Start 10 min monitor'){timerM((k)=>{if(k==='done'){l.push({t:ts(),text:'<strong>10 min monitoring complete</strong>',agent:true});ms2(id,i);doneM('Monitoring complete','Proceed to next step if supply has not recovered');}});return;}
  if(label==='Reassign'||label==='Reassign order'){confirmM('Reassign order?','Order offered to next available courier',()=>{l.push({t:ts(),text:'<strong>Order reassigned</strong>',agent:true});ms2(id,i);doneM('Reassigned','Next courier notified');});return;}
  if(label.includes('Cancel')&&label!=='Cancel order'){confirmM('Cancel order '+(a.orderId||'')+'?','Customer will be notified and charge refunded',()=>{l.push({t:ts(),text:'<strong>Order cancelled</strong>',agent:true});ms2(id,i);});return;}
  if(label==='Open profile'){doneM('Opening courier profile','In production this opens the courier profile page');ms2(id,i);return;}

  // FALLBACK
  l.push({t:ts(),text:`<strong>${label}</strong>`,agent:true});ms2(id,i);doneM(label,'Step marked as complete');
  if(sel===id&&ACTIONS.find(x=>x.id===id))rd(id);
}

rl();
</script>
