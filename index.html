<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveOps — 3PL Actions</title>
<style>
  @font-face {
    font-family: 'JetSansDigital';
    src: url('./font.woff2') format('woff2');
    font-weight: 100 1000;
    font-stretch: 25% 151%;
    font-style: oblique 0deg 20deg;
    font-display: swap;
  }
</style>
<link rel="stylesheet" href="pie.css">
<script type="module" src="pie-bundle.js"></script>
<style>
:root{
  /* Tonal soft colours */
  --pink:var(--dt-color-berry-40);
  --teal:var(--dt-color-cupcake-30);
  --yellow:var(--dt-color-turmeric-10);
  --amber:var(--dt-color-turmeric-40);
  /* PIE semantic token aliases */
  --dark:var(--dt-color-interactive-primary);
  --light:var(--dt-color-white);
  --orange:var(--dt-color-interactive-brand);
  --red:var(--dt-color-support-error);
  --bg:var(--dt-color-container-default);
  --bg2:var(--dt-color-background-subtle);
  --bg3:var(--dt-color-background-default);
  --text:var(--dt-color-content-default);
  --text2:var(--dt-color-content-subdued);
  --text3:var(--dt-color-content-disabled);
  --border:var(--dt-color-border-default);
  --border2:var(--dt-color-border-strong);
  --radius:var(--dt-radius-rounded-b);
  --radius-lg:var(--dt-radius-rounded-c);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--dt-font-family-primary),var(--dt-font-family-secondary),sans-serif;background:#FDFDFB;color:var(--text);font-size:14px;display:flex;flex-direction:column;}
.shell{display:flex;flex-direction:column;height:100%;position:relative;}
.topnav{display:flex;align-items:center;height:64px;background:#FFFFFF;border-bottom:1px solid #E7E2DA;flex-shrink:0;padding-right:16px;}
.topnav-icon-area{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo{font-weight:900;font-size:16px;color:var(--dark);}
.partner-pill{font-size:12px;padding:3px 8px;border-radius:4px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.nav-spacer{flex:1;}
.zone-btn{font-size:12px;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-weight:400;white-space:nowrap;min-height:36px;}
.user-btn{font-size:12px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-weight:700;white-space:nowrap;min-height:36px;}
.content-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.zone-view{display:none;flex:1;overflow-y:auto;padding:20px 16px 32px;background:var(--bg);-webkit-overflow-scrolling:touch;}
.zone-view.active{display:block;}
.main-view{display:flex;flex:1;overflow:hidden;position:relative;}
.main-view.hidden{display:none;}
.zone-back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);cursor:pointer;margin-bottom:20px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;min-height:40px;}
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--dt-spacing-b);margin-bottom:var(--dt-spacing-e);}
.metric-card{padding:16px;background:var(--bg2);border-radius:var(--radius-lg);}
.metric-val{font-size:28px;font-weight:700;line-height:1;}
.metric-lbl{font-size:12px;color:var(--text2);margin-top:var(--dt-spacing-a);line-height:1.33;}
.metric-delta{font-size:12px;color:var(--text2);margin-top:var(--dt-spacing-a);line-height:1.33;}
.sla-lbl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:var(--dt-spacing-c);}
.sla-grid{display:grid;grid-template-columns:1fr;gap:var(--dt-spacing-b);}
.sla-card{padding:var(--dt-spacing-c) var(--dt-spacing-d);background:var(--bg2);border-radius:var(--radius-lg);}
.sla-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.sla-name{font-size:14px;}
.sla-pct{font-size:20px;font-weight:400;}
.sla-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.sla-fill{height:100%;border-radius:2px;background:var(--dark);}
/* TABS */
.action-list{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#FFFFFF;}
.tab-bar{display:flex;flex-direction:row;align-items:stretch;height:56px;padding:0;flex-shrink:0;background:#FFFFFF;border-bottom:1px solid #E7E2DA;}
.tab-btn{position:relative;flex:1;padding:0 8px;font-size:var(--dt-font-body-l-size,16px);font-weight:var(--dt-font-body-strong-l-weight,700);line-height:var(--dt-font-body-l-line-height,24px);font-family:inherit;background:transparent;border:none;cursor:pointer;color:#3C4C4F;display:flex;align-items:center;justify-content:center;gap:6px;height:100%;white-space:nowrap;transition:color .15s;}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:transparent;border-radius:2px 2px 0 0;transition:background .15s;}
.tab-btn.on{color:#242E30;}
.tab-btn.on::after{background:#F36805;}
.tab-count{display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:400;line-height:1;padding:2px 6px;border-radius:10px;background:#F0ECE6;color:#3C4C4F;min-width:20px;flex-shrink:0;}
.filter-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.filter-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.f-btn{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:32px;}
.f-btn.on{background:var(--dark);color:var(--light);border-color:var(--dark);}
.list-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;}
.list-section-label{font-size:12px;font-weight:700;color:var(--text2);padding:4px 0 0;letter-spacing:0.02em;text-transform:uppercase;}
.list-scroll::-webkit-scrollbar{width:3px;}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
/* ACTION CARDS */
.action-card{padding:16px 20px;border:1px solid #F0ECE6;border-radius:12px;background:#FFFFFF;cursor:pointer;transition:background .1s,border-color .1s;display:flex;flex-direction:column;gap:14px;flex-shrink:0;}
.action-card.selected{background:#F6F3EF;border-color:#F36805;}
.action-card.selected .ptag-icon-wrap{background:#FFFFFF;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:0;}
.card-type{font-size:16px;font-weight:900;line-height:20px;color:rgba(0,0,0,0.76);}
.card-time{font-size:12px;color:rgba(0,0,0,0.64);flex-shrink:0;line-height:16px;}
.card-desc{font-size:12px;color:var(--text2);margin-bottom:var(--dt-spacing-b);line-height:1.33;}
.card-note{font-size:12px;color:var(--text);font-style:italic;margin-bottom:var(--dt-spacing-b);padding:var(--dt-spacing-a) var(--dt-spacing-b);background:var(--bg2);border-radius:var(--radius);border-left:2px solid var(--border2);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
/* Tags — Figma spec: ALL tags are Size Large (24px, 14px text, 22×22 icon) */
.ptag{display:inline-flex;align-items:center;gap:4px;border:1px solid #E7E2DA;border-radius:12px;padding:1px 8px 1px 1px;height:24px;white-space:nowrap;flex-shrink:0;}
.ptag-icon-wrap{width:22px;height:22px;border-radius:50%;background:#F0ECE6;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#242E30;}
.ptag-label{font-size:14px;font-weight:400;line-height:20px;color:#242E30;}
/* DETAIL PANEL */
.detail-panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--bg);z-index:10;}
.main-view.showing-detail .detail-panel{display:flex;}
.main-view.showing-detail .action-list{display:none;}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;text-align:center;padding:24px;}
/* PIE Toast */
#toast{position:fixed;bottom:var(--dt-spacing-e);left:50%;transform:translateX(-50%) translateY(12px);background:#1a1a18;color:#fff;border-radius:var(--dt-radius-rounded-b);padding:10px var(--dt-spacing-c);display:flex;align-items:flex-start;gap:var(--dt-spacing-b);font-size:14px;line-height:1.43;opacity:0;transition:opacity 0.18s ease,transform 0.18s ease;pointer-events:none;z-index:1000;white-space:normal;box-shadow:var(--dt-elevation-04);max-width:calc(100vw - 32px);}
#toast.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
#toast-msg{flex:1;}
#toast-close{background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;padding:2px;display:flex;align-items:center;margin-left:var(--dt-spacing-b);flex-shrink:0;line-height:1;}
.detail-header{padding:8px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.detail-back{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:700;color:#242E30;cursor:pointer;margin-bottom:6px;padding:0;background:none;border:none;min-height:28px;width:167px;}
/* Detail header — title block (mobile: stacked; web: inline row) */
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.dh-title-block{flex:1;min-width:0;}
.dh-title{font-size:28px;font-weight:900;line-height:32px;color:rgba(0,0,0,0.76);margin-bottom:6px;}
.dh-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dh-orderid{font-size:14px;font-weight:400;color:rgba(0,0,0,0.76);line-height:20px;flex-shrink:0;}
.dh-menu-btn{background:none;border:none;cursor:pointer;color:#242E30;width:32px;height:32px;border-radius:8px;margin:-4px -8px 0 0;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.dh-menu-btn:hover{background:#F0ECE6;}
.dh-menu-btn svg{display:block;}
.dh-times{display:flex;flex-direction:column;font-size:12px;color:rgba(0,0,0,0.64);line-height:16px;margin-top:6px;gap:1px;}
.detail-meta{display:flex;gap:var(--dt-spacing-b);align-items:center;flex-wrap:wrap;}
.detail-body{flex:1;overflow-y:auto;padding:var(--dt-spacing-d) var(--dt-spacing-d) 32px;-webkit-overflow-scrolling:touch;}
.detail-action-bar{display:none;padding:var(--dt-spacing-c) var(--dt-spacing-d);border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;box-shadow:var(--dt-elevation-above-20);}
.detail-body::-webkit-scrollbar{width:3px;}
.detail-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.section{margin-bottom:var(--dt-spacing-d);}
.section-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:var(--dt-spacing-b);line-height:1.33;}
.trigger-box{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.trigger-row{display:flex;align-items:flex-start;justify-content:space-between;padding:var(--dt-spacing-c) var(--dt-spacing-d);border-bottom:1px solid var(--border);font-size:14px;gap:var(--dt-spacing-b);}
.trigger-row:last-child{border-bottom:none;}
.trigger-rule{color:var(--text2);}
.trigger-val{font-weight:400;display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;text-align:right;}
.threshold{font-size:12px;color:var(--text2);font-weight:400;}
/* PIE data table — trigger table */
.trigger-table{width:100%;border-collapse:collapse;}
.trigger-table tr{border-bottom:1px solid var(--border);}
.trigger-table tr:last-child{border-bottom:none;}
.trigger-cell-rule{padding:var(--dt-spacing-b) var(--dt-spacing-d);font-size:14px;color:var(--text2);}
.trigger-cell-val{padding:var(--dt-spacing-b) var(--dt-spacing-d);font-size:14px;font-weight:500;white-space:nowrap;}
/* Alert rows — icon + dark text, tint as secondary cue only */
.tr-alert{background:rgba(245,166,35,0.07);}
.tr-alert .trigger-cell-rule{color:var(--text);}
.tr-alert .trigger-cell-val{color:var(--text);font-weight:600;}
.trigger-cell-icon{padding:var(--dt-spacing-b) 0 var(--dt-spacing-b) var(--dt-spacing-d);width:32px;vertical-align:middle;line-height:0;}
.trigger-cell-rule{padding:var(--dt-spacing-b) var(--dt-spacing-b) var(--dt-spacing-b) 0;font-size:14px;color:var(--text2);}
.trigger-cell-threshold{padding:var(--dt-spacing-b) var(--dt-spacing-d);font-size:12px;color:var(--text2);text-align:right;white-space:nowrap;}
/* CHECKLIST */
/* PIE data table body row — action list */
.checklist{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.checklist-table{width:100%;border-collapse:collapse;}
.ct-row{border-bottom:1px solid var(--border);}
.ct-row:last-child{border-bottom:none;}
/* DONE: ticked + muted */
.ct-row.done{background:var(--bg2);}
.ct-row.done .cml{color:var(--text2);}
.ct-row.done .check-sub{color:var(--text3);}
/* SKIPPED: crossed + strikethrough + reason tag */
.ct-row.skipped{background:var(--bg2);}
.ct-row.skipped .cml{color:var(--text3);text-decoration:line-through;}
.ct-row.skipped .check-sub{color:var(--text3);}
/* Leading checkbox cell */
.ct-check{width:44px;padding:var(--dt-spacing-b) 0 var(--dt-spacing-b) var(--dt-spacing-d);vertical-align:top;}
/* Content cell — double-line + actions + tags */
.ct-body{padding:var(--dt-spacing-b) var(--dt-spacing-d);vertical-align:top;}
.check-box{width:20px;height:20px;border-radius:var(--dt-radius-rounded-a);border:1.5px solid var(--dt-color-border-form);display:flex;align-items:center;justify-content:center;background:var(--bg);margin-top:1px;}
.check-box.checked{background:var(--dt-color-interactive-primary);border-color:var(--dt-color-interactive-primary);}
.check-box.checked::after{content:'';display:block;width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);}
.check-box.crossed{background:var(--bg2);border-color:var(--border);}
.check-box.crossed::after{content:'—';font-size:13px;line-height:1;color:var(--text3);}
/* Double-line: primary label + secondary sub */
.cml{font-size:14px;line-height:1.43;margin-bottom:var(--dt-spacing-a);}
.check-sub{font-size:12px;color:var(--text2);display:block;margin-bottom:var(--dt-spacing-b);line-height:1.33;}
.check-btns{display:flex;gap:var(--dt-spacing-b);flex-wrap:wrap;align-items:center;}
.skip-btn{padding:7px 11px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;min-height:36px;}
.skip-reason-tag{display:inline-flex;align-items:center;margin-top:var(--dt-spacing-b);font-size:12px;line-height:1.33;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:var(--dt-radius-rounded-b);padding:2px var(--dt-spacing-b);}
.inline-note{font-size:12px;color:var(--text2);margin-top:var(--dt-spacing-b);padding:var(--dt-spacing-b) var(--dt-spacing-c);background:var(--bg2);border-radius:var(--radius);border-left:2px solid var(--border2);}
.inline-note .nl{font-weight:700;color:var(--text);display:block;margin-bottom:2px;font-size:12px;font-style:normal;}
.inline-note .no{color:var(--amber);font-size:12px;display:block;margin-top:var(--dt-spacing-a-small);}
.act-btn{padding:10px 14px;font-size:14px;font-weight:400;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;min-height:40px;}
.act-btn.primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.act-btn.safety-esc{background:var(--pink);color:var(--dark);border-color:var(--pink);}
.act-btn.boost{background:var(--amber);color:var(--dark);border-color:var(--amber);}
.act-btn.undo{background:var(--bg2);border-color:var(--border2);}
.table-scroll{overflow:hidden;margin-top:var(--dt-spacing-b);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--dt-elevation-01);}
.table-scroll-inner{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.table-scroll-inner::-webkit-scrollbar{height:3px;}
.table-scroll-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
/* PIE data table — header row (title + optional action) */
.pie-dt-header{display:flex;align-items:center;justify-content:space-between;padding:var(--dt-spacing-b) var(--dt-spacing-d);border-bottom:1px solid var(--border);background:var(--bg);}
.pie-dt-title{font-size:14px;font-weight:700;color:var(--text);}
.pie-dt-meta{font-size:12px;color:var(--text2);margin-left:var(--dt-spacing-b);}
/* PIE data table — column headers and rows */
.courier-table{width:100%;border-collapse:collapse;min-width:360px;}
.courier-table th{font-size:12px;font-weight:700;color:var(--text2);padding:var(--dt-spacing-b) var(--dt-spacing-d);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;line-height:1.33;}
.courier-table td{padding:var(--dt-spacing-b) var(--dt-spacing-d);border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;white-space:nowrap;line-height:1.43;}
.courier-table tr:last-child td{border-bottom:none;}
.courier-name{font-weight:400;}
.courier-stat{color:var(--text2);}
.log-entry{display:flex;gap:var(--dt-spacing-b);padding:var(--dt-spacing-b) 0;border-bottom:1px solid var(--border);font-size:12px;}
.log-entry:last-child{border-bottom:none;}
.log-time{color:var(--text2);flex-shrink:0;width:42px;}
.log-text{color:var(--text2);line-height:1.5;}
.log-text strong{color:var(--text);font-weight:400;}
.log-table{width:100%;border-collapse:collapse;}
.log-hdr-row{background:var(--dt-color-container-subtle,#f7f4f0);border-bottom:1px solid var(--border);}
.log-th{padding:var(--dt-spacing-c) var(--dt-spacing-d);font-size:13px;font-weight:600;color:var(--text);text-align:left;}
.log-th-ts{white-space:nowrap;}
.log-tr{border-bottom:1px solid var(--border);}
.log-tr:last-child{border-bottom:none;}
.log-td{padding:var(--dt-spacing-c) var(--dt-spacing-d);font-size:13px;color:var(--text);vertical-align:top;line-height:1.5;}
.log-td-time{white-space:nowrap;font-size:12px;color:var(--text2);min-width:180px;}
.log-entry.al .log-text{color:var(--text);}
/* RECENTLY CLOSED */
.closed-card{padding:var(--dt-spacing-d);border-bottom:1px solid var(--border);cursor:pointer;border-left:3px solid transparent;}
.closed-card.selected{background:var(--bg2);border-left-color:var(--orange);}
.closed-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.closed-time{font-size:12px;color:var(--text3);flex-shrink:0;}
.closed-reason{font-size:12px;color:var(--text2);margin-bottom:8px;}
.archived-row{padding:16px;text-align:center;border-top:1px solid var(--border);}
/* MODAL */
.modal-top{display:flex;align-items:flex-start;gap:var(--dt-spacing-c);}
.modal-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.modal-icon.calling{background:var(--teal);}
.modal-icon.confirm{background:var(--yellow);}
.modal-icon.done{background:var(--dark);color:#fff;font-size:16px;}
.modal-icon.warn{background:var(--pink);}
.modal-icon.timer{background:var(--teal);}
.modal-text{flex:1;}
.modal-sub{font-size:14px;color:var(--text2);line-height:1.5;}
.modal-sub.stern{color:var(--text);font-weight:400;}
.modal-btn{padding:14px 16px;font-size:14px;font-weight:400;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;text-align:center;min-height:48px;font-family:inherit;}
.modal-btn.confirm-btn{background:var(--dark);color:var(--light);border-color:var(--dark);}
.modal-btn.warn-btn{background:var(--pink);color:var(--dark);border-color:var(--pink);}
.modal-btn.active{background:var(--bg2);border-color:var(--border2);font-weight:700;}
.modal-list{list-style:none;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.modal-list li{padding:var(--dt-spacing-b) var(--dt-spacing-c);font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--dt-spacing-b);color:var(--text2);}
.modal-list li:last-child{border-bottom:none;}
.modal-list li::before{content:'✓';font-size:12px;color:var(--text2);}
.modal-lbl{font-size:12px;font-weight:700;margin-bottom:var(--dt-spacing-a);color:var(--text2);line-height:1.33;}
.modal-ta{width:100%;font-size:14px;font-family:inherit;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);resize:none;outline:none;line-height:1.5;-webkit-appearance:none;}
.modal-ta:focus{border-color:var(--border2);}
.modal-input{width:100%;font-size:14px;font-family:inherit;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:var(--border2);}
.modal-countdown{font-size:32px;font-weight:400;text-align:center;padding:8px 0;color:var(--text);}
.modal-note-sub{font-size:12px;color:var(--text2);margin-top:6px;text-align:center;}
/* TOPNAV additions */
.jet-icon{flex-shrink:0;}
.topnav-sep{width:1px;height:32px;background:#FF8000;flex-shrink:0;margin-right:16px;}
.topnav-partner{font-size:20px;font-weight:900;line-height:24px;color:rgba(0,0,0,0.76);}
.burger-btn{width:36px;height:36px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0;flex-shrink:0;}
.burger-line{display:block;width:18px;height:1.5px;background:var(--text);border-radius:1px;}
/* SIDEBAR */
.sidebar{width:72px;background:#FFFFFF;border-right:1px solid #E7E2DA;display:flex;flex-direction:column;align-items:center;padding:24px 8px;gap:4px;flex-shrink:0;overflow:hidden;}
.sb-icon{width:56px;height:56px;border-radius:12px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#242E30;transition:background .12s,color .12s;}
.sb-icon:hover{background:#F0ECE6;}
.sb-icon.sb-active{color:#F36805;}
.sb-icon{--icon-size-override:24px;}
/* LIST HEADER */
.list-header{padding:16px;flex-shrink:0;border-bottom:1px solid #F0ECE6;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;}
.list-header-row{display:flex;align-items:center;justify-content:space-between;}
.list-title{font-size:28px;font-weight:900;line-height:32px;color:rgba(0,0,0,0.76);}
.list-sub{font-size:12px;font-weight:400;line-height:16px;color:rgba(0,0,0,0.64);margin-top:0;}
.list-subtitle{font-size:12px;font-weight:400;line-height:16px;color:rgba(0,0,0,0.48);margin-top:2px;}
.online-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 8px 4px 6px;border-radius:16px;border:1px solid #E7E2DA;background:transparent;font-size:14px;font-weight:700;cursor:pointer;color:#242E30;white-space:nowrap;flex-shrink:0;}
.online-dot{display:none;}
/* CARD updates */
.card-number{font-size:14px;color:rgba(0,0,0,0.64);margin-bottom:0;margin-top:2px;line-height:20px;}
.card-footer{font-size:12px;color:rgba(0,0,0,0.64);margin-top:0;line-height:16px;display:flex;flex-direction:column;gap:4px;}
.card-menu{background:none;border:none;cursor:pointer;color:#242E30;width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:-4px -8px 0 0;padding:0;}
.card-menu:hover{background:var(--bg2);}
.card-menu svg{display:block;}
/* Per-tag colour variants — kept for future use, all inherit base .ptag style */
.ptag-urgent,.ptag-safety,.ptag-zone,.ptag-manyorders,.ptag-agerestricted,.ptag-heavyorder,.ptag-neutral,.ptag-green{}
/* PIE Bottom Sheet */
.bs-ov{position:fixed;inset:0;background:rgba(0,0,0,0.56);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.22s ease;display:flex;align-items:flex-end;justify-content:center;}
.bs-ov.open{opacity:1;pointer-events:auto;}
#bs{width:100%;max-width:560px;background:var(--bg);border-radius:var(--dt-radius-rounded-c) var(--dt-radius-rounded-c) 0 0;box-shadow:var(--dt-elevation-04);transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;font-family:var(--dt-font-family-primary),var(--dt-font-family-secondary),sans-serif;}
.bs-ov.open #bs{transform:translateY(0);}
#bs-hdr{display:flex;align-items:center;gap:var(--dt-spacing-b);padding:var(--dt-spacing-b) var(--dt-spacing-d);border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px;}
.bs-title{flex:1;font-size:16px;font-weight:700;line-height:1.5;color:var(--text);font-family:inherit;}
.bs-x{background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;padding:6px;line-height:0;border-radius:50%;margin-right:-4px;}
.bs-x:hover{background:var(--bg2);}
#bs-body{flex:1;overflow-y:auto;padding:var(--dt-spacing-d);-webkit-overflow-scrolling:touch;min-height:0;}
#bs-body{scrollbar-width:none;}
#bs-body::-webkit-scrollbar{display:none;}
#bs-ft{padding:var(--dt-spacing-c) var(--dt-spacing-d);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(var(--dt-spacing-c),env(safe-area-inset-bottom));}
#ma{display:flex;flex-direction:column;gap:var(--dt-spacing-b);}
/* A1 — STEP UX */
.detail-tabs{display:flex;flex-direction:row;align-items:stretch;height:44px;flex-shrink:0;background:#FFFFFF;border-bottom:1px solid #E7E2DA;}
.detail-tab-btn{flex:1;font-size:var(--dt-font-body-l-size,16px);font-weight:var(--dt-font-body-strong-l-weight,700);line-height:var(--dt-font-body-l-line-height,24px);font-family:inherit;background:transparent;border:none;cursor:pointer;color:#3C4C4F;white-space:nowrap;padding:0;height:44px;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.detail-tab-btn.on{color:#242E30;box-shadow:inset 0 -3px 0 0 #F36805;}
.step-toggle-row{background:#FFFFFF;padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0ECE6;}
.step-toggle-label{font-size:16px;font-weight:400;line-height:24px;color:rgba(0,0,0,0.76);}
.step-toggle{width:48px;height:24px;border-radius:12px;background:#8C867E;position:relative;cursor:pointer;flex-shrink:0;transition:background .15s;}
.step-toggle.on{background:#F36805;}
.step-toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#FFFFFF;transition:left .15s;pointer-events:none;}
.step-toggle.on .step-toggle-knob{left:26px;}
.step-list-wrap{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:20px;display:flex;flex-direction:column;gap:20px;}
.step-list-wrap::-webkit-scrollbar{width:3px;}
.step-list-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.step-card{background:#FFFFFF;border:1px solid #F0ECE6;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:16px;flex-shrink:0;}
.step-card.active{background:#F6F3EF;border-color:#F36805;}
.step-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.step-title{font-weight:900;font-size:16px;line-height:20px;color:rgba(0,0,0,0.76);}
.step-sub{font-weight:700;font-size:14px;line-height:20px;color:rgba(0,0,0,0.76);margin-top:2px;}
.step-menu-btn{background:none;border:none;cursor:pointer;color:#242E30;width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin:-4px -8px 0 0;padding:0;}
.step-menu-btn:hover{background:#F0ECE6;}
.step-menu-btn svg{display:block;}
.step-notes-label{font-weight:400;font-size:14px;line-height:20px;color:#242E30;display:block;margin-bottom:8px;}
.step-notes-wrap{border:1px solid #8C867E;border-radius:12px;padding:12px 16px;}
.step-notes-ta{width:100%;font-size:16px;font-weight:400;line-height:1.5;color:#262626;font-family:inherit;border:none;outline:none;resize:none;background:transparent;display:block;}
.step-cb-list{display:flex;flex-direction:column;gap:12px;}
.step-cb-row{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.step-cb-box{width:24px;height:24px;border-radius:4px;border:1.5px solid #8C867E;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#FFFFFF;transition:background .12s,border-color .12s;}
.step-cb-box.chk{background:#F36805;border-color:#F36805;}
.step-cb-box.chk::after{content:'';display:block;width:12px;height:7px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px);}
.step-cb-label{font-size:14px;font-weight:400;line-height:24px;color:#242E30;}
.step-cta-btn{width:100%;padding:0 24px;height:36px;border-radius:999px;font-weight:800;font-size:16px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .12s;text-align:center;}
.step-cta-btn.orange{background:#F36805;color:#FFFFFF;border:none;}
.step-cta-btn.dark{background:#2B2A28;color:rgba(255,255,255,0.9);border:none;}
.step-cta-btn.outline{background:transparent;border:1.5px solid #E7E2DA;color:#242E30;}
.step-cta-btn.muted{background:#F0ECE6;color:#8C867E;border:none;}
.step-cta-btn:disabled{opacity:1;cursor:not-allowed;}
.step-complete-footer{font-size:12px;font-weight:400;color:rgba(0,0,0,0.76);line-height:16px;}
.list-filter-row{display:flex;gap:8px;align-items:center;}
.list-filter-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(0,0,0,0.2);border-radius:20px;padding:5px 10px 5px 8px;font-size:14px;font-weight:700;background:var(--bg);cursor:pointer;color:var(--text);font-family:inherit;white-space:nowrap;}
.list-filter-chip svg{flex-shrink:0;}
.list-filter-chip.active{background:var(--dark);color:var(--light);border-color:var(--dark);}
.list-filter-icon.has-filter{background:#FFF3EC;border-color:#F36805;color:#F36805;}
.list-filter-icon{border:1px solid rgba(0,0,0,0.2);border-radius:8px;padding:5px 7px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.progress-section{padding:var(--dt-spacing-d) var(--dt-spacing-d) var(--dt-spacing-e);border-top:1px solid var(--border);}
.progress-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.progress-track{width:100%;height:4px;background:#F6F3EF;border-radius:2px;overflow:hidden;}
.progress-fill{height:4px;background:var(--dt-color-interactive-brand,#F36805);border-radius:2px;transition:width 0.4s ease;}
.step-skip-tag{font-size:12px;color:rgba(0,0,0,0.64);padding:4px 8px;background:#F0ECE6;border-radius:8px;display:inline-block;margin-top:2px;}
.status-chip{display:inline-flex;align-items:center;gap:4px;border:1px solid #E7E2DA;border-radius:16px;padding:0 12px;font-size:14px;font-weight:700;color:#242E30;height:32px;cursor:pointer;background:transparent;white-space:nowrap;font-family:inherit;}
/* DESKTOP */
@media(min-width:768px){
  .logo{font-size:16px;font-weight:900;}
  .summary-row{grid-template-columns:repeat(4,1fr);gap:var(--dt-spacing-c);}
  .sla-grid{grid-template-columns:1fr 1fr;}
  .zone-view{padding:24px;}
  .main-view{flex-direction:row;}
  .action-list{width:336px;border-right:1px solid #E7E2DA;}
  .filter-header{padding:var(--dt-spacing-b) var(--dt-spacing-d);}
  .f-btn{padding:4px 10px;font-size:12px;min-height:auto;}
  .card-desc{font-size:12px;margin-bottom:var(--dt-spacing-a);}
  .detail-panel{position:static;display:flex!important;flex:1;min-width:0;}
  .main-view.showing-detail .action-list{display:flex;}
  .detail-back{display:none;}
  .detail-header{padding:var(--dt-spacing-d) var(--dt-spacing-e) 14px;}
  .dh-title-block{display:flex;flex-direction:row;align-items:center;flex-wrap:wrap;gap:12px;}
  .dh-title{margin-bottom:0;font-size:28px;}
  .dh-meta-row{flex-wrap:wrap;}
  .detail-body{padding:var(--dt-spacing-d) var(--dt-spacing-e);}
  .trigger-row{padding:var(--dt-spacing-b) var(--dt-spacing-d);font-size:12px;}
  .stat-val{font-size:20px;}
  .ct-check{padding:var(--dt-spacing-b) 0 var(--dt-spacing-b) var(--dt-spacing-c);width:36px;}
  .ct-body{padding:var(--dt-spacing-b) var(--dt-spacing-c);}
  .check-box{width:16px;height:16px;}
  .check-box.checked::after{width:8px;height:5px;}
  .cml{font-size:12px;}
  .check-sub{font-size:12px;}
  .act-btn{padding:6px 11px;font-size:12px;min-height:auto;}
  .skip-btn{padding:5px 9px;font-size:12px;min-height:auto;}
  .log-entry{font-size:12px;}
  .modal-btn{min-height:auto;padding:8px 16px;font-size:12px;}
  .modal-ta{font-size:12px;}
  .modal-input{font-size:12px;padding:8px 11px;}
  .modal-sub{font-size:12px;}
  .detail-action-bar{display:none;}
}
/* Mobile — PIE app shell patterns */
@media(max-width:767px){
  .detail-panel{left:72px;}
  /* Close issue moves to sticky bottom action bar on mobile */
  .detail-header-close{display:none!important;}
  .detail-action-bar{display:flex;gap:var(--dt-spacing-b);padding-bottom:max(var(--dt-spacing-c),env(safe-area-inset-bottom));}
  .detail-action-bar pie-button{flex:1;}
  /* Safe area insets */
  .list-scroll{padding-bottom:max(var(--dt-spacing-b),env(safe-area-inset-bottom));}
}

    <div class="zone-view" id="zone-view">
      <pie-button variant="ghost" onclick="toggleZone()"><icon-arrow-left size="xs"></icon-arrow-left> Back to issues</pie-button>
      <div class="summary-row">
        <div class="metric-card"><div class="metric-val">8</div><div class="metric-lbl">Active orders</div></div>
        <div class="metric-card"><div class="metric-val">5</div><div class="metric-lbl">Couriers on duty</div></div>
        <div class="metric-card"><div class="metric-val">18m</div><div class="metric-lbl">Avg delivery time</div><div class="metric-delta">↓ 2m vs yesterday</div></div>
        <div class="metric-card"><div class="metric-val">7</div><div class="metric-lbl">Open actions</div><div class="metric-delta">↑ 1 new</div></div>
      </div>
      <div class="sla-lbl">SLA today</div>
      <div class="sla-grid">
        <div class="sla-card"><div class="sla-top"><span class="sla-name">On-time delivery</span><span class="sla-pct">84%</span></div><div class="sla-track"><div class="sla-fill" style="width:84%"></div></div></div>
        <div class="sla-card"><div class="sla-top"><span class="sla-name">Pickup within 5 min</span><span class="sla-pct">67%</span></div><div class="sla-track"><div class="sla-fill" style="width:67%"></div></div></div>
        <div class="sla-card"><div class="sla-top"><span class="sla-name">Issue-free orders</span><span class="sla-pct">91%</span></div><div class="sla-track"><div class="sla-fill" style="width:91%"></div></div></div>
        <div class="sla-card"><div class="sla-top"><span class="sla-name">Completion rate</span><span class="sla-pct">58%</span></div><div class="sla-track"><div class="sla-fill" style="width:58%"></div></div></div>
      </div>
    </div>
    <div class="main-view" id="main-view">
      <div class="sidebar" id="sidebar">
        <button class="sb-icon sb-active" id="sb-issues" aria-label="Issues">
          <icon-alert-circle></icon-alert-circle>
        </button>
        <button class="sb-icon" aria-label="Orders">
          <icon-backpack></icon-backpack>
        </button>
        <button class="sb-icon" onclick="toggleZone()" id="sb-stats" aria-label="Stats">
          <icon-pie-chart></icon-pie-chart>
        </button>
        <button class="sb-icon" aria-label="Pause">
          <icon-pause-circle></icon-pause-circle>
        </button>
        <div style="flex:1"></div>
        <button class="sb-icon" aria-label="Settings">
          <icon-settings></icon-settings>
        </button>
        <button class="sb-icon" aria-label="Help">
          <icon-info-circle></icon-info-circle>
        </button>
      </div>
      <div class="action-list">
        <div class="list-header">
          <h1 class="list-title">Issue list</h1>
          <div class="list-sub" id="list-sub">Last updated: just now</div>
          <div class="list-filter-row">
            <button class="list-filter-chip" id="myissues-filter-chip" onclick="toggleMyIssuesFilter()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My issues<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
            <button class="list-filter-chip" id="status-filter-chip" onclick="toggleOpenFilter()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="status-chip-label">Open</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
            <button class="list-filter-icon" id="type-filter-btn" onclick="showTypeFilters()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="7" cy="18" r="2" fill="currentColor" stroke="none"/></svg></button>
          </div>
        </div>
        <div class="list-scroll" id="action-list-scroll"></div>
      </div>
      <div class="detail-panel" id="detail-panel"><div class="detail-empty">Select an issue to see details and steps</div></div>
    </div>
  </div>
  <div id="toast" role="status" aria-live="polite">
    <span id="toast-icon" style="flex-shrink:0;display:flex;align-items:center"></span>
    <span id="toast-msg"></span>
    <button id="toast-close" onclick="hideToast()" aria-label="Dismiss"><icon-close size="xs"></icon-close></button>
  </div>
  <div id="bs-ov" class="bs-ov" onclick="bsOvClick(event)">
    <div id="bs" role="dialog" aria-modal="true" aria-labelledby="bs-ttl">
      <div id="bs-hdr">
        <div class="modal-icon" id="mi"></div>
        <span id="bs-ttl" class="bs-title"></span>
        <button class="bs-x" onclick="mact('n')" aria-label="Close"><icon-close size="s"></icon-close></button>
      </div>
      <div id="bs-body">
        <div id="ms" class="modal-sub"></div>
        <div id="me"></div>
      </div>
      <div id="bs-ft"><div id="ma"></div></div>
    </div>
  </div>
</div>
<script>
/* ===== STATE ===== */
const chk={},logs={},meta={},skipped={};
const CLOSED=[];
let mcb=null,af='all',sel=null,activeTab='actions',courierOnlineStatus=null,filterMyIssues=true,filterOpen=true;

const SKIP_REASONS=['Already resolved','Not applicable to this case','Handled by another agent','Courier self-resolved','Customer cancelled','Management override'];
const CLOSE_REASONS=['Fully resolved','Resolved offline','Duplicate incident','False alarm','Escalated to another team','No action required'];

/* ===== UTILS ===== */
function ts(){return Date.now();}
function gc(id){if(!chk[id])chk[id]={};return chk[id];}
function gl(id){
  if(!logs[id]){
    const a=ACTIONS.find(x=>x.id===id)||{log:[]};
    logs[id]=[...a.log];
    if(!logs[id].length){
      logs[id].unshift({t:a.openedAt||Date.now(),text:'Issue created'+(a.source?' — '+a.source:''),agent:false,creation:true});
    }
  }
  return logs[id];
}
function fmtLogTs(t){
  const d=new Date(t);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const date=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
  const time=(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  const mins=Math.floor((Date.now()-t)/60000);
  const ago=mins<1?'just now':mins<60?mins+' min ago':Math.floor(mins/60)+'h ago';
  return date+' '+time+' ('+ago+')';
}
function renderLog(l){
  if(!l.length)return'<div style="font-size:13px;color:var(--dt-color-content-disabled);padding:var(--dt-spacing-c) 0">No activity yet</div>';
  const hdr='<tr class="log-hdr-row"><th class="log-th" style="width:100%">Action</th><th class="log-th log-th-ts">Timestamp</th></tr>';
  const rows=l.map(x=>'<tr class="log-tr"><td class="log-td">'+x.text.replace(/<strong>/g,'').replace(/<\/strong>/g,'')+'</td><td class="log-td log-td-time">'+fmtLogTs(x.t)+'</td></tr>').join('');
  return'<table class="trigger-box log-table">'+hdr+rows+'</table>';
}
function gm(id){if(!meta[id])meta[id]={};return meta[id];}
function nv(eid){const e=document.getElementById(eid);return e?e.value.trim():'';}
function isMobile(){return window.innerWidth<768;}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago';}
function minsAgo(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'just now';return m+' min'+(m===1?'':'s')+' ago';}
function stag(s){if(s==='safety')return'<span class="ptag ptag-safety">Safety</span>';if(s==='urgent')return'<span class="ptag ptag-urgent">Urgent</span>';return '';}
function otag(id){return id?`<span class="ptag ptag-zone">${id}</span>`:'';}
function ztag(){return'<span class="ptag ptag-zone">Entire zone</span>';}
function ntag(){return'<span class="ptag ptag-green">New</span>';}
const TAG_DEF={
  urgent:       {cls:'ptag-urgent',       icon:'<icon-clock-alert  size="xs"></icon-clock-alert>',  label:'Urgent'},
  safety:       {cls:'ptag-safety',       icon:'<icon-alert-circle size="xs"></icon-alert-circle>', label:'Safety'},
  zone:         {cls:'ptag-zone',         icon:'<icon-map          size="xs"></icon-map>',          label:'Entire zone'},
  manyorders:   {cls:'ptag-manyorders',   icon:'<icon-chevron-up   size="xs"></icon-chevron-up>',   label:'Multiple orders'},
  agerestricted:{cls:'ptag-agerestricted',icon:'<icon-id-card      size="xs"></icon-id-card>',      label:'Age restricted'},
  heavyorder:   {cls:'ptag-heavyorder',   icon:'<icon-weight       size="xs"></icon-weight>',       label:'Heavy order'},
};
function renderTags(a){return(a.tags||[]).map(t=>{const d=TAG_DEF[t]||{cls:'ptag-neutral',icon:'',label:t};return`<span class="ptag ${d.cls}"><span class="ptag-icon-wrap">${d.icon}</span><span class="ptag-label">${d.label}</span></span>`;}).join('');}

/* ===== MODALS ===== */
function abv(c){return c==='confirm-btn'?'primary':c==='warn-btn'?'destructive':'ghost';}
function showM(ico,cls,title,sub,subCls,extra,actions){
  document.getElementById('bs-ttl').textContent=title;
  const mi=document.getElementById('mi');mi.innerHTML=ico;mi.className='modal-icon '+cls;mi.style.display=ico?'':'none';
  const se=document.getElementById('ms');se.textContent=sub;se.className='modal-sub'+(subCls?' '+subCls:'');se.style.display=sub?'':'none';
  const me=document.getElementById('me');me.innerHTML=extra||'';me.style.marginTop=(extra&&sub)?'var(--dt-spacing-b)':'0';
  document.getElementById('ma').innerHTML=actions.map(a=>`<pie-button variant="${abv(a.c)}" fullWidth onclick="mact('${a.k}')">${a.l}</pie-button>`).join('');
  document.getElementById('bs-ov').classList.add('open');
  setTimeout(()=>{
    const field=document.querySelector('#me textarea[required],#me input[required]');
    if(!field)return;
    const btn=document.querySelector('#ma pie-button[variant="primary"]');
    if(!btn)return;
    const sync=()=>{btn.disabled=!field.value.trim();};
    sync();
    field.addEventListener('input',sync);
  },0);
}
function mact(k){
  const ov=document.getElementById('bs-ov');const bs=document.getElementById('bs');
  ov.classList.remove('open');bs.style.transform='';bs.style.transition='';
  if(mcb){const c=mcb;mcb=null;c(k);}
}
function bsOvClick(e){if(e.target===document.getElementById('bs-ov'))mact('n');}
window.addEventListener('pageshow',(e)=>{if(e.persisted){filterOpen=true;filterMyIssues=true;updateStatusChip();sel=null;document.getElementById('detail-panel').innerHTML='<div class="detail-empty">Select an issue to see details and steps</div>';document.getElementById('main-view').classList.remove('showing-detail');rl();}});
document.addEventListener('DOMContentLoaded',()=>{
  bsTouchInit();
  updateStatusChip();
  rl();
  // Auto-select first issue so the right panel is never empty on load
  if(!isMobile()){const firstIssue=fa()[0];if(firstIssue){sel=firstIssue.id;rl();rd(firstIssue.id);document.getElementById('main-view').classList.add('showing-detail');}}
  document.addEventListener('keydown',(e)=>{if(e.key==='Escape'&&document.getElementById('bs-ov').classList.contains('open'))mact('n');});
  // Update "last updated" timestamp every 30s
  setInterval(()=>{const el=document.getElementById('list-sub');if(el)el.textContent='Last updated: just now';},30000);
  // Re-render every 60s so all "X mins ago" timers stay accurate
  setInterval(()=>{rl();if(sel)rd(sel);},60000);
});

function callM(name,mandatory,cb){
  mcb=cb;
  const req=mandatory?`<span style="color:var(--pink);font-weight:400"> *required</span>`:' (optional)';
  showM('<icon-phone size="s"></icon-phone>','calling','Calling '+name,'Call in progress — confirm when done','',
    `<div class="modal-lbl">Call notes${req}</div><textarea id="mn" class="modal-ta" rows="3" placeholder="Add notes from the call…" ${mandatory?'required':''}></textarea>`,
    [{l:'End call & confirm',c:'confirm-btn',k:'done'},{l:'Back',c:'',k:'x'}]);
}
function callCourierOnlineM(name,cb){
  courierOnlineStatus=null;mcb=cb;
  showM('<icon-phone size="s"></icon-phone>','calling','Calling '+name,'Call in progress — confirm when done','',
    `<div class="modal-lbl">Is the courier coming online?</div>
     <div style="display:flex;gap:8px;margin-bottom:10px">
       <pie-button id="btn-yes" variant="secondary" style="flex:1" onclick="setCourierOnline(true)">Yes — coming online</pie-button>
       <pie-button id="btn-no" variant="secondary" style="flex:1" onclick="setCourierOnline(false)">No — unavailable</pie-button>
     </div>
     <div id="online-sel" style="min-height:18px;font-size:12px;margin-bottom:10px"></div>
     <div class="modal-lbl">Call notes (optional)</div>
     <textarea id="mn" class="modal-ta" rows="2" placeholder="Add notes from the call…"></textarea>`,
    [{l:'End call & confirm',c:'confirm-btn',k:'done'},{l:'Back',c:'',k:'x'}]);
}
function setCourierOnline(val){
  courierOnlineStatus=val;
  const el=document.getElementById('online-sel');
  if(el)el.innerHTML=val?'<span style="color:var(--dt-color-content-positive);font-weight:700">Coming online</span>':'<span style="color:var(--dt-color-content-subdued)">Unavailable</span>';
  const yes=document.getElementById('btn-yes');const no=document.getElementById('btn-no');
  if(yes)yes.setAttribute('variant',val===true?'primary':'secondary');
  if(no)no.setAttribute('variant',val===false?'primary':'secondary');
}
function confirmM(title,sub,cb,subCls,extra){
  mcb=(k)=>{if(k==='y')cb();};
  showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm',title,sub,subCls||'',extra||'',[{l:'Confirm',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
}
function warnM(title,sub,cb){
  mcb=(k)=>{if(k==='y')cb();};
  showM('<icon-alert-circle size="s"></icon-alert-circle>','warn',title,sub,'stern','',[{l:'I understand — confirm',c:'warn-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
}
function doneM(title,sub,isError){mcb=null;showToast(sub?title+' — '+sub:title,isError);}
let _toastTimer;
function showToast(msg,isError){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-icon').innerHTML=isError
    ?'<icon-close size="xs" style="color:#e03131"></icon-close>'
    :'<icon-check-circle size="xs" style="color:#4caf50"></icon-check-circle>';
  el.classList.add('visible');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(hideToast,4000);
}
function hideToast(){
  document.getElementById('toast').classList.remove('visible');
}
function downstreamM(title,items,cb){
  mcb=(k)=>{if(k==='y')cb();};
  showM('<icon-check-circle size="s"></icon-check-circle>','done',title,'The following will be triggered automatically:','',
    `<ul class="modal-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`,
    [{l:'Confirm & trigger all',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
}
function timerM(cb){
  mcb=cb;
  showM('','timer','Simulating 10 minutes','Monitoring zone N4 for supply recovery','',
    `<div class="modal-countdown" id="fk">10:00</div><div class="modal-note-sub">Demo only</div>`,
    [{l:'10 mins has passed — continue',c:'confirm-btn',k:'done'},{l:'Back',c:'',k:'n'}]);
  let phase=1,count=0;
  const iv=setInterval(()=>{
    count++;const el=document.getElementById('fk');if(!el){clearInterval(iv);return;}
    if(phase===1){
      const rem=600-count;const m=Math.floor(rem/60);const s=rem%60;
      el.textContent=m+':'+(s<10?'0':'')+s;
      if(count>=3){phase=2;count=0;el.textContent='0:03';}
    }else{
      el.textContent='0:0'+Math.max(0,3-count);
      if(count>=3){clearInterval(iv);el.textContent='0:00';}
    }
  },1000);
}
function overrideM(from,to,cb){
  mcb=(k)=>{if(k==='y'){const n=nv('mn');if(!n){doneM('Note required','Please add your reasoning before overriding',true);return;}cb(n);}};
  showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm','Override decision?',`Change from "${from}" to "${to}" — steps will update`,'',
    `<div class="modal-lbl">Reason <span style="color:var(--pink);font-weight:400">*required</span></div><textarea id="mn" class="modal-ta" rows="3" placeholder="Explain why the decision is changing…" required></textarea>`,
    [{l:'Confirm override',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
}
function recipientM(cb){
  mcb=(k)=>{if(k==='y')cb(nv('ri'));};
  showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm','Who will receive the return?','The partner needs a named contact to accept the returned order','',
    `<div class="modal-lbl">Recipient name at partner <span style="color:var(--pink);font-weight:400">*required</span></div>
     <input id="ri" class="modal-input" type="text" placeholder="e.g. Maria S." required>
     <div style="font-size:12px;color:var(--text2);margin-top:6px">Enter a name to confirm</div>`,
    [{l:'Confirm',c:'confirm-btn',k:'y'},{l:'Back',c:'',k:'n'}]);
}
function snoozeM(id,i){
  mcb=(k)=>{
    if(k.startsWith('s:')){const mins=k.slice(2);
      gl(id).push({t:ts(),text:`<strong>Snoozed ${mins} min</strong> — reminder set`,agent:true});
      if(sel===id)rd(id);
      doneM('Snoozed',`You'll be reminded in ${mins} minutes`);
    }
  };
  showM('','timer','Snooze reminder?','How long should we wait?','',
    `<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">${[10,15,30].map(t=>`<pie-button variant="secondary" fullWidth onclick="mact('s:${t}')">${t} min</pie-button>`).join('')}</div>`,
    [{l:'Back',c:'',k:'n'}]);
}
function compensationM(give,cb){
  const reasons=give
    ?['Courier mistake','Partner mistake','Goodwill — recook','Preparation delay']
    :['Order fulfilled correctly','No party at fault','Partner at fault','Duplicate report'];
  mcb=(k)=>{if(k.startsWith('r:'))cb(give,k.slice(2));};
  showM(give?'<icon-check-circle size="s"></icon-check-circle>':'<icon-close size="s"></icon-close>','confirm',give?'Recook compensation — reason':'No compensation — reason','Choose the most appropriate reason:','',
    `<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">${reasons.map(r=>`<pie-button variant="secondary" fullWidth onclick="mact('r:${r}')">${r}</pie-button>`).join('')}</div>`,
    [{l:'Back',c:'',k:'n'}]);
}
function splitOrderM(orderId,cb){
  mcb=(k)=>{if(k.startsWith('c:'))cb(parseInt(k.slice(2)));};
  showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm',`Split ${orderId}?`,'How many total orders are needed?','',
    `<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">${[2,3,4].map(n=>`<pie-button variant="secondary" fullWidth onclick="mact('c:${n}')">${n} orders total</pie-button>`).join('')}</div>`,
    [{l:'Back',c:'',k:'n'}]);
}
function promptCloseIncident(id){
  mcb=(k)=>{if(k.startsWith('r:'))closeAndResolve(id,k.slice(2));};
  showM('<icon-close size="s"></icon-close>','warn','Close issue?','Select a reason for closing this issue','stern',
    `<div style="display:flex;flex-direction:column;gap:var(--dt-spacing-b);margin-top:var(--dt-spacing-b)">${CLOSE_REASONS.map(r=>`<pie-button variant="secondary" fullWidth onclick="mact('r:${r}')">${r}</pie-button>`).join('')}</div>`,
    [{l:'Back',c:'',k:'n'}]);
}
function promptSkipStep(id,i){
  const a=ACTIONS.find(x=>x.id===id);
  mcb=(k)=>{if(k.startsWith('r:'))skipStep(id,i,k.slice(2));};
  showM('<icon-close size="s"></icon-close>','confirm','Mark step as not needed?',`"${a.steps[i].label}"`, '',
    `<div style="display:flex;flex-direction:column;gap:var(--dt-spacing-b);margin-top:var(--dt-spacing-b)">${SKIP_REASONS.map(r=>`<pie-button variant="secondary" fullWidth onclick="mact('r:${r}')">${r}</pie-button>`).join('')}</div>`,
    [{l:'Back',c:'',k:'n'}]);
}
function showItemsM(a){
  const items=a.orderItems||[];
  const html=items.length?items.map(it=>`<div class="trigger-row"><span class="trigger-rule">${it.name}</span><span class="trigger-val">${it.qty}×</span></div>`).join(''):'<div class="trigger-row"><span style="color:var(--dt-color-content-disabled)">No items data</span></div>';
  showM('<icon-alert-circle size="s"></icon-alert-circle>','confirm','Order items','',' ',`<div class="trigger-box">${html}</div>`,[{l:'Done',c:'confirm-btn',k:'x'}]);
}

/* ===== INCIDENT MANAGEMENT ===== */
function closeAndResolve(id,reason){
  const a=ACTIONS.find(x=>x.id===id);if(!a)return;
  const m=gm(id);
  gl(id).push({t:ts(),text:`<strong>Issue closed</strong> — ${reason}`,agent:true});
  m.closedAt=Date.now();
  m.closedReason=reason;
  m.showComplete=true;
  CLOSED.unshift({action:a,closedAt:m.closedAt,closedReason:reason});
  sel=id;
  updateClosedCount();rl();
  rd(id);
  // Mobile: keep showing-detail so user sees the closed panel
  document.getElementById('main-view').classList.add('showing-detail');
}
function skipStep(id,i,reason){
  if(!skipped[id])skipped[id]={};
  skipped[id][i]={r:reason,t:Date.now()};
  const a=ACTIONS.find(x=>x.id===id);
  gl(id).push({t:ts(),text:`<strong>Step ${i+1} — not needed.</strong> Reason: ${reason}`,agent:true});
  if(a.steps.every((_,j)=>!!gc(id)[j]||(skipped[id]&&skipped[id][j]))){
    setTimeout(()=>closeAndResolve(id,'All steps complete'),500);
  }else{if(sel===id)rd(id);}
  rl();
}
function openClosedTicket(idx,e){
  if(e)e.stopPropagation();
  const c=CLOSED[idx];
  const a=c.action;
  const m=gm(a.id);
  delete m.closedAt;
  delete m.closedReason;
  m.showComplete=false;
  CLOSED.splice(idx,1);
  updateClosedCount();
  filterOpen=true;updateStatusChip();

function callAllCouriers(e,id,si,ck){
  e.stopPropagation();
  const a=ACTIONS.find(x=>x.id===id);const m=gm(id);
  if(!m['c_'+ck])m['c_'+ck]=new Set();
  const crs=a[ck]||[];const uncalled=crs.filter(c=>!m['c_'+ck].has(c.name));
  if(!uncalled.length){doneM('All couriers already called','');return;}
  confirmM(`Call all ${uncalled.length} remaining couriers?`,uncalled.map(c=>c.name).join(', '),()=>{
    const l=gl(id);
    uncalled.forEach(c=>{m['c_'+ck].add(c.name);l.push({t:ts(),text:`<strong>Call completed</strong> — ${c.name}`,agent:true});});
    l.push({t:ts(),text:'<strong>All couriers contacted</strong>',agent:true});
    const step=a.steps[si];
    if(step.allCalls&&crs.every(c=>m['c_'+ck].has(c.name)))ms2(id,si);
    doneM('All couriers called','All excess couriers have been contacted');
    rd(id);rl();
  });
}

function autoFillIncidents(){
  const MIN=5;if(ACTIONS.length>=MIN)return;
  const existingTypes=new Set(ACTIONS.map(a=>a.type));
  const pool=INCIDENT_TEMPLATES.filter(t=>!existingTypes.has(t.type));
  if(!pool.length)return;
  const need=MIN-ACTIONS.length;let added=0;
  for(let i=0;i<need&&pool.length>0;i++){
    const idx=Math.floor(Math.random()*pool.length);
    const tmpl=pool.splice(idx,1)[0];_gInc++;
    ACTIONS.push(Object.assign({},tmpl,{
      id:'GEN'+_gInc,isNew:true,time:'just now',log:[],
      trigger:JSON.parse(JSON.stringify(tmpl.trigger)),
      steps:JSON.parse(JSON.stringify(tmpl.steps)),
      stats:tmpl.stats?JSON.parse(JSON.stringify(tmpl.stats)):[],
    }));added++;
  }
  if(added>0)rl();
}

function bsTouchInit(){
  const bs=document.getElementById('bs');
  const hdr=document.getElementById('bs-hdr');
  let startY=0;
  hdr.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;bs.style.transition='none';},{passive:true});
  hdr.addEventListener('touchmove',e=>{
    const dy=Math.max(0,e.touches[0].clientY-startY);
    bs.style.transform=dy>0?`translateY(${dy}px)`:'translateY(0)';
  },{passive:true});
  hdr.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>80){mact('n');}else{bs.style.transition='';bs.style.transform='';}
  });
}

function ms2(id,i){
  gc(id)[i]=Date.now();

  const a=ACTIONS.find(x=>x.id===id);
  gl(id).push({t:ts(),text:`<strong>Step ${i+1} complete</strong> — ${a.steps[i].label}`,agent:true});
  if(a.steps.every((_,j)=>!!gc(id)[j]||(skipped[id]&&skipped[id][j]))){
    setTimeout(()=>closeAndResolve(id,'All steps complete'),500);
  }else{if(sel===id)rd(id);}

}

function rd(id){

  if(m.showComplete===undefined)m.showComplete=false;

  const showComplete=m.showComplete;
  const showRejected=m.showRejected;
  const firstInc=a.steps.findIndex((s,i)=>!ch[i]&&!(skipped[id]&&skipped[id][i]));
  const doneCount=a.steps.filter((s,i)=>!!ch[i]).length;
  const skippedCount=a.steps.filter((_,i)=>!!(skipped[id]&&skipped[id][i])).length;
  const tr=a.trigger.map(t=>`<tr class="${t.t?'tr-alert':''}"><td class="trigger-cell-icon">${t.t?'<icon-alert-triangle size="xs" aria-label="Exceeds threshold" style="color:var(--dt-color-content-warning-strong,var(--amber))"></icon-alert-triangle>':''}</td><td class="trigger-cell-rule">${t.r}</td><td class="trigger-cell-val">${t.v}</td><td class="trigger-cell-threshold">${t.t||''}</td></tr>`).join('');
  const itemsSection=a.orderItems?`<div class="section"><div class="section-label">Order items</div><div class="trigger-box">${a.orderItems.map(it=>`<div class="trigger-row"><span class="trigger-rule">${it.name}</span><span class="trigger-val">${it.qty}×</span></div>`).join('')}</div></div>`:'';
  const lh=renderLog(l);

  function renderStep(step,i){

    let ctbl='';

      ctbl=`<div class="table-scroll">

        </div>
        <div class="table-scroll-inner"><table class="courier-table"><thead><tr><th>Courier</th>${isE?'<th>Utilisation</th><th>Last delivery</th><th>Orders today</th>':'<th>Shifts</th><th>Last active</th>'}<th></th></tr></thead><tbody>${
          crs.map(c=>{
            const called=cs.has(c.name);
            const onlineTxt=m['online_'+c.name]===true?' <span style="font-size:12px;color:var(--dt-color-content-positive);font-weight:700">online</span>':m['online_'+c.name]===false?' <span style="font-size:12px;color:var(--dt-color-content-disabled)">unavailable</span>':'';
            const calledTxt=called&&!onlineTxt?' <span style="font-size:12px;color:var(--dt-color-content-disabled)">(called)</span>':'';
            return`<tr style="${called?'opacity:0.55':''}"><td><span class="courier-name">${c.name}</span>${called?onlineTxt+calledTxt:''}</td>${isE?`<td class="courier-stat">${c.utilisation}</td><td class="courier-stat">${c.lastDelivery}</td><td class="courier-stat">${c.orders}</td>`:`<td class="courier-stat">${c.shifts}</td><td class="courier-stat">${c.lastActive}</td>`}<td><pie-button variant="${called?'ghost':'secondary'}" size="xsmall" onclick="hcc(event,'${id}',${i},'${c.name}','${step.ck}')">${called?'Called':'<icon-phone size="xs"></icon-phone> Call'}</pie-button></td></tr>`;

    }
    let ni='';

    if(m.ovNote&&i===0)ni+=`<div class="inline-note"><span class="no">Override applied</span>${m.ovNote}</div>`;
    if(m.compensation&&i===1&&id==='A5')ni+=`<div class="inline-note"><span class="nl">Compensation decision</span>${m.compensation.give?'Approved':'Not given'} — ${m.compensation.reason}</div>`;

    const footerTxt=done?`You completed this step ${minsAgo(ch[i])}`:isSk?`You rejected this step ${minsAgo(skipped[id][i].t)}: ${skipped[id][i].r}`:`${a.assignedTo?`Assigned to ${a.assignedTo}`:'<strong>Unassigned</strong>'}`;
    const footer=`<div class="step-complete-footer">${footerTxt}</div>`;
    return`<div class="step-card ${cardCls}">${hdr}${btnsHtml}${ctbl}${ni}${footer}</div>`;

  let tabContent;
  if(tab==='steps'){
    const incHtml=a.steps.map((s,i)=>{if(ch[i]||(skipped[id]&&skipped[id][i]))return'';return renderStep(s,i);}).join('');
    const cmpHtml=a.steps.map((s,i)=>{if(!ch[i])return'';return renderStep(s,i);}).join('');
    const skpHtml=a.steps.map((s,i)=>{if(!(skipped[id]&&skipped[id][i]))return'';return renderStep(s,i);}).join('');
    const pct=a.steps.length?(firstInc===-1?100:Math.round((firstInc+1)/a.steps.length*100)):0;
    const progressHtml=`<div class="progress-section"><div class="progress-label">Progress</div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
    const toggleHtml=doneCount>0?`<div class="step-toggle-row"><span class="step-toggle-label">${showComplete?'Hide complete steps':'View complete steps'}</span><div class="step-toggle${showComplete?' on':''}" onclick="rdToggleHide('${id}')"><div class="step-toggle-knob"></div></div></div>`:'';
    const rejectToggleHtml=skippedCount>0?`<div class="step-toggle-row"><span class="step-toggle-label">${showRejected?'Hide rejected steps':'View rejected steps'}</span><div class="step-toggle${showRejected?' on':''}" onclick="rdToggleRejected('${id}')"><div class="step-toggle-knob"></div></div></div>`:'';
    tabContent=`<div class="step-list-wrap">${incHtml||''}${toggleHtml}${showComplete?cmpHtml:''}${rejectToggleHtml}${showRejected?skpHtml:''}</div>${progressHtml}`;
  } else if(tab==='details'){
    tabContent=`<div class="detail-body">
      <div class="section"><div class="table-scroll" style="margin-top:0"><table class="trigger-table">${tr}</table></div></div>
      ${itemsSection}
    </div>`;
  } else {
    tabContent=`<div class="detail-body"><div class="section"><div class="section-label">Activity log</div>${lh}</div></div>`;
  }

  document.getElementById('detail-panel').innerHTML=`
    <div class="detail-header">
      <button class="detail-back" onclick="backToList()"><icon-chevron-left size="xs" style="color:#F36805"></icon-chevron-left> Return to issue list</button>
      <div class="dh-top">
        <div class="dh-title-block">

        </div>
        ${isClosed?'':`<button class="dh-menu-btn" onclick="promptCloseIncident('${id}')" aria-label="More options"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="4" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="16" r="1.5"/></svg></button>`}
      </div>
      <div class="dh-times">
        <span>Opened: ${minsAgo(a.openedAt||Date.now())}</span>
        <span>${a.assignedAt?`Assigned: ${minsAgo(a.assignedAt)}`:'Assigned: auto-assigned'}</span>
        ${isClosed?`<span>Closed: ${minsAgo(m.closedAt)}</span>`:''}
      </div>

  requestAnimationFrame(()=>{const s=document.querySelector('.step-list-wrap');if(s)s.scrollTop=_st;});

  // index of first step that is neither done nor skipped

    tabContent=`<div class="step-list-wrap">${incHtml||''}${toggleHtml}${showComplete?cmpHtml:''}${rejectToggleHtml}${showRejected?skpHtml:''}</div>${progressHtmlA1}`;

      <button class="detail-tab-btn${tab==='history'?' on':''}" onclick="a1Tab('history')">History</button>

  requestAnimationFrame(()=>{const s=document.querySelector('.step-list-wrap');if(s)s.scrollTop=_st;});
